name: Test

# Regression gate. The whole point of the test suite is to catch regressions
# during fast iteration — so it MUST run automatically on every PR and push,
# not just locally. Required check: a PR that fails this cannot merge.
on:
  pull_request:
  push:
    branches: [main, 'dev/**']

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JS/TS gate: typecheck + lint + deterministic test projects + bundle smoke.
  #
  # `integration` is the CI-safe stateful pool: serial, scratch filesystem and
  # loopback-only network via setup-integration.ts. Real Provider / SDK smoke
  # lives in `credentialed` and is intentionally excluded from public CI.
  js:
    name: typecheck · lint · tests · build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:classification
      - run: npm run test:unit
      # `dom` project (jsdom, no secrets) holds security-invariant tests —
      # externalResourceGuard (zero-egress) + WidgetRenderer (about:srcdoc
      # transport). Must gate too, else those regressions wouldn't block a merge.
      - run: npm run test:dom
      - run: npm run test:integration
      # Typecheck does not exercise esbuild/Vite bundling, raw imports, or
      # runtime entrypoint packaging. These cheap smoke builds catch that class.
      - run: npm run build:server
      - run: npm run build:bridge
      - run: npm run build:cli
      - run: npm run build:web

  # Rust gate: cargo test plus project redline Clippy rules. We only deny
  # disallowed_methods/macros here; ordinary Clippy warnings stay non-fatal
  # until they are cleaned up in a dedicated phase.
  rust:
    name: cargo test · clippy redlines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Prepare Tauri bundle path placeholders for cargo tests
        run: |
          # Tauri validates bundle resource paths during build-script execution.
          # This Linux CI job runs Rust unit tests, not a distributable Linux
          # bundle, so provide inert runner-local placeholders for paths that
          # are intentionally not committed.
          mkdir -p src-tauri/resources/claude-agent-sdk
          mkdir -p src-tauri/resources/sharp-runtime
          mkdir -p src-tauri/resources/tsx-runtime
          mkdir -p src-tauri/resources/nodejs
          printf 'console.log("ci server-dist placeholder");\n' > src-tauri/resources/server-dist.js
          printf 'console.log("ci plugin-bridge placeholder");\n' > src-tauri/resources/plugin-bridge-dist.mjs
          printf 'ci placeholder\n' > src-tauri/resources/claude-agent-sdk/.ci-placeholder
          printf 'ci placeholder\n' > src-tauri/resources/sharp-runtime/.ci-placeholder
          printf 'ci placeholder\n' > src-tauri/resources/tsx-runtime/.ci-placeholder
          printf 'ci placeholder\n' > src-tauri/resources/nodejs/.ci-placeholder
          mkdir -p src-tauri/binaries
          printf '#!/usr/bin/env sh\nexit 0\n' > src-tauri/binaries/cuse-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/cuse-x86_64-unknown-linux-gnu
          mkdir -p mino
          printf '# CI placeholder for Tauri resource validation\n' > mino/CLAUDE.md
      - run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D clippy::disallowed_methods -D clippy::disallowed_macros
