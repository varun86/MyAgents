<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyAgents Launcher Right Rail Playground</title>
  <style>
    :root {
      --breakpoint-mobile: 768px;
      --sidebar-min-width: 320px;
      --header-height: 48px;

      --font-latin: "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI";
      --font-chinese: "PingFang SC", "Microsoft YaHei", "Microsoft YaHei UI", "Hiragino Sans GB";
      --font-body: var(--font-latin), var(--font-chinese), sans-serif;
      --font-display: var(--font-latin), var(--font-chinese), sans-serif;

      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 16px;
      --text-lg: 18px;

      --ink: #1c1612;
      --ink-secondary: #2e2825;
      --ink-muted: #6f6156;
      --ink-subtle: #a69a90;
      --ink-faint: #c4b8ad;

      --paper: #faf6ee;
      --paper-a0: rgb(250 246 238 / 0);
      --paper-elevated: #fffcf7;
      --paper-elevated-a0: rgb(255 252 247 / 0);
      --paper-inset: #e8dccf;
      --paper-inset-a0: rgb(232 220 207 / 0);
      --hover-bg: rgba(194, 109, 58, 0.07);

      --accent: #c26d3a;
      --accent-warm: #c26d3a;
      --accent-warm-hover: #e18a58;
      --accent-warm-subtle: rgba(194, 109, 58, 0.08);
      --accent-warm-muted: rgba(194, 109, 58, 0.15);
      --success: #2d8a5e;
      --success-bg: #e2f0e8;
      --heartbeat: #c75050;
      --heartbeat-bg: rgba(199, 80, 80, 0.10);

      --line: rgb(28 22 18 / 0.10);
      --line-strong: rgb(28 22 18 / 0.18);
      --line-subtle: rgb(28 22 18 / 0.06);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-full: 9999px;

      --shadow-xs: 0 1px 2px rgb(28 22 18 / 0.05);
      --shadow-sm: 0 2px 8px rgb(28 22 18 / 0.08);
      --shadow-md: 0 8px 24px rgb(28 22 18 / 0.12);

      --duration-fast: 150ms;
      --duration-normal: 200ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button {
      border: 0;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    svg {
      display: block;
      flex: none;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--ink-subtle) transparent;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-thumb {
      border-radius: 3px;
      background: var(--ink-subtle);
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    .app {
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgb(255 252 247 / 0.72), rgb(250 246 238 / 0) 180px),
        radial-gradient(circle at 18% 18%, rgb(255 252 247 / 0.62), transparent 34%),
        var(--paper);
    }

    .titlebar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 20px;
      border-bottom: 1px solid rgb(28 22 18 / 0.04);
      color: var(--ink-muted);
      user-select: none;
    }

    .traffic {
      display: flex;
      gap: 8px;
      margin-right: 10px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: var(--radius-full);
    }

    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #28c840; }

    .tab {
      height: 44px;
      min-width: 210px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 16px;
      font-size: var(--text-sm);
      color: var(--ink-muted);
      position: relative;
    }

    .tab.active {
      color: var(--ink);
      background: rgb(232 220 207 / 0.42);
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .tab.small {
      min-width: auto;
      width: 40px;
      font-size: 24px;
      color: var(--ink-muted);
      background: transparent;
    }

    .title-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .title-action {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .launcher-layout {
      height: calc(100% - 56px);
      display: grid;
      grid-template-columns: 60fr minmax(var(--sidebar-min-width), 40fr);
      grid-template-areas: "brand workspaces";
      overflow: hidden;
    }

    .launcher-brand {
      grid-area: brand;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 42px;
    }

    .brand-stack {
      width: min(760px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(12px);
    }

    .brand-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 72px;
      line-height: 1.1;
      font-weight: 250;
      letter-spacing: 0.02em;
      background: linear-gradient(155deg, var(--ink) 30%, var(--accent-warm) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-slogan {
      margin: 20px 0 34px;
      color: rgb(111 97 86 / 0.72);
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    .mode-switch {
      height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px;
      border-radius: 14px;
      background: var(--paper-inset);
      box-shadow: inset 0 0 0 1px rgb(28 22 18 / 0.06);
    }

    .mode-button {
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 16px;
      border-radius: 11px;
      background: transparent;
      color: var(--ink-muted);
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .mode-button.active {
      background: var(--paper-elevated);
      color: var(--ink);
      box-shadow: var(--shadow-xs);
    }

    .composer {
      width: min(760px, 100%);
      min-height: 154px;
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgb(255 252 247 / 0.82);
      box-shadow: 0 18px 48px rgb(28 22 18 / 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px 20px 14px;
    }

    .composer-placeholder {
      color: var(--ink-muted);
      font-size: 17px;
      font-weight: 500;
    }

    .composer-toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--ink-muted);
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .tool-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--ink-muted);
    }

    .send-button {
      width: 40px;
      height: 40px;
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      background: rgb(28 22 18 / 0.08);
      color: var(--ink-subtle);
    }

    .context-row {
      width: min(760px, 100%);
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .context-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 14px;
      border-radius: var(--radius-full);
      background: rgb(255 252 247 / 0.58);
      color: var(--ink-muted);
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .launcher-workspaces {
      grid-area: workspaces;
      position: relative;
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
      padding: 24px 0;
    }

    .launcher-workspaces::before {
      content: "";
      position: absolute;
      left: 0;
      top: 24px;
      bottom: 24px;
      width: 1px;
      background: var(--line);
    }

    .right-inner {
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      padding: 0 24px 0 28px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .section-title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .section-title {
      margin: 0;
      color: var(--ink-muted);
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .section-subtitle {
      color: rgb(111 97 86 / 0.52);
      font-size: var(--text-xs);
      white-space: nowrap;
    }

    .section-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: none;
    }

    .ghost-button,
    .icon-button,
    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-weight: 500;
      transition: background var(--duration-fast), color var(--duration-fast), box-shadow var(--duration-fast);
    }

    .ghost-button {
      height: 32px;
      padding: 0 10px;
      background: transparent;
      color: var(--ink-muted);
    }

    .ghost-button:hover,
    .icon-button:hover {
      background: var(--paper-inset);
      color: var(--ink);
    }

    .icon-button {
      width: 32px;
      height: 32px;
      background: transparent;
      color: var(--ink-muted);
    }

    .primary-button {
      height: 36px;
      padding: 0 14px;
      border-radius: var(--radius-full);
      background: var(--button-primary-bg, var(--accent));
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .primary-button:hover {
      background: #b05e2d;
    }

    .workspaces-panel {
      flex: none;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      transition: max-height var(--duration-normal);
    }

    .workspaces-panel.expanded {
      max-height: min(430px, 42vh);
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 2px;
    }

    .workspace-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .workspace-card {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 76px;
      border-radius: var(--radius-xl);
      background: var(--paper-elevated);
      padding: 14px 14px;
      text-align: left;
      box-shadow: none;
      transition: box-shadow var(--duration-fast), background var(--duration-fast);
    }

    .workspace-card:hover {
      background: #fffdf9;
      box-shadow: var(--shadow-sm);
    }

    .workspace-icon {
      width: 28px;
      height: 28px;
      flex: none;
      filter: invert(45%) sepia(15%) saturate(500%) hue-rotate(350deg) brightness(85%);
    }

    .workspace-copy {
      min-width: 0;
      flex: 1;
    }

    .workspace-name {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 6px;
      color: var(--ink);
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .workspace-title-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspace-inline-tags {
      display: inline-flex;
      flex: none;
      align-items: center;
      gap: 5px;
    }

    .truncate {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspace-path {
      margin-top: 3px;
      color: var(--ink-muted);
      font-size: var(--text-xs);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 18px;
      border-radius: 5px;
      padding: 0 6px;
      font-size: var(--text-xs);
      font-weight: 500;
      line-height: 18px;
      white-space: nowrap;
    }

    .badge.success {
      background: color-mix(in srgb, var(--success) 12%, transparent);
      color: var(--success);
    }

    .badge.neutral {
      background: var(--paper-inset);
      color: var(--ink-subtle);
    }

    .badge.heartbeat {
      background: var(--heartbeat-bg);
      color: var(--heartbeat);
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: var(--radius-full);
      background: currentColor;
    }

    .more-workspaces {
      width: 100%;
      height: 34px;
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--ink-muted);
      font-size: var(--text-sm);
      font-weight: 500;
      transition: background var(--duration-fast), color var(--duration-fast);
    }

    .more-workspaces:hover {
      background: var(--hover-bg);
      color: var(--ink);
    }

    .history-panel {
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      padding-top: 18px;
      overflow: hidden;
    }

    .history-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-muted);
    }

    .filter-chip {
      height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--ink-muted);
      padding: 0 10px;
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .filter-chip:hover {
      background: var(--paper-inset);
      color: var(--ink);
    }

    .history-scroll {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 3px;
    }

    .day-group {
      padding: 3px 0 12px;
    }

    .day-label {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 28px;
      background: linear-gradient(180deg, var(--paper), var(--paper-a0));
      color: rgb(111 97 86 / 0.58);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .day-line {
      height: 1px;
      flex: 1;
      background: var(--line-subtle);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-row {
      position: relative;
      display: flex;
      width: 100%;
      min-height: 42px;
      align-items: center;
      gap: 10px;
      border-radius: var(--radius-lg);
      background: transparent;
      padding: 8px 9px 8px 8px;
      text-align: left;
      transition: background var(--duration-fast);
    }

    .history-row:hover {
      background: var(--hover-bg);
    }

    .history-time {
      width: 58px;
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: rgb(111 97 86 / 0.50);
      font-size: var(--text-xs);
      font-variant-numeric: tabular-nums;
    }

    .history-project {
      width: 108px;
      min-width: 0;
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgb(111 97 86 / 0.54);
      font-size: var(--text-xs);
    }

    .history-project img {
      width: 15px;
      height: 15px;
      filter: invert(45%) sepia(15%) saturate(500%) hue-rotate(350deg) brightness(85%);
      opacity: 0.84;
    }

    .history-project-name {
      min-width: 0;
      max-width: 78px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .history-main {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-tag {
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: var(--radius-full);
      padding: 3px 6px;
      font-size: var(--text-xs);
      font-weight: 500;
      line-height: 1;
    }

    .history-tag-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      background: currentColor;
    }

    .history-tag.im {
      background: color-mix(in srgb, var(--success) 10%, transparent);
      color: var(--success);
    }

    .history-tag.cron {
      background: var(--accent-warm-subtle);
      color: var(--accent-warm);
    }

    .history-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink-secondary);
      font-size: var(--text-sm);
      transition: color var(--duration-fast);
    }

    .history-row:hover .history-title {
      color: var(--ink);
    }

    .message-count {
      flex: none;
      color: rgb(111 97 86 / 0.42);
      font-size: var(--text-xs);
    }

    .empty-note {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      color: rgb(111 97 86 / 0.58);
      font-size: var(--text-sm);
    }

    @media (max-width: 980px) {
      .titlebar {
        gap: 10px;
      }

      .tab:not(.active):not(.small) {
        display: none;
      }

      .launcher-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        grid-template-areas:
          "brand"
          "workspaces";
      }

      .launcher-brand {
        min-height: 310px;
        padding: 24px;
        border-bottom: 1px solid var(--line);
      }

      .brand-title {
        font-size: 56px;
      }

      .launcher-workspaces {
        padding-top: 18px;
      }

      .launcher-workspaces::before {
        display: none;
      }
    }

    @media (max-width: 680px) {
      .title-actions,
      .context-row {
        display: none;
      }

      .launcher-brand {
        min-height: 270px;
      }

      .brand-slogan {
        font-size: 15px;
        text-align: center;
      }

      .workspace-grid {
        grid-template-columns: 1fr;
      }

      .history-project {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="titlebar" aria-label="App titlebar mock">
      <div class="traffic" aria-hidden="true">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="tab">MyAgents 首页埋点审计</div>
      <div class="tab">MyAgents任务系统Chat化</div>
      <div class="tab active">
        <span>New Tab</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </div>
      <div class="tab small">+</div>
      <nav class="title-actions" aria-label="Top actions mock">
        <span class="title-action">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 10h14v9H5zM8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
          </svg>
          小助理
        </span>
        <span class="title-action">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 11l2 2 4-5M5 4h14v16H5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          任务
        </span>
        <span class="title-action">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="2" />
            <path d="M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.1L14.2 3h-4.4l-.3 2.7a7 7 0 0 0-2 1.1l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.1l.3 2.7h4.4l.3-2.7a7 7 0 0 0 2-1.1l2.4 1 2-3.4-2-1.6c.1-.4.1-.8.1-1.2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
          </svg>
          设置
        </span>
      </nav>
    </header>

    <main class="launcher-layout">
      <section class="launcher-brand" aria-label="Launcher brand mock">
        <div class="brand-stack">
          <h1 class="brand-title">MyAgents</h1>
          <p class="brand-slogan">每个人都应享受智能的推背感，欢迎来到言出法随的世界</p>

          <div class="mode-switch" role="tablist" aria-label="Mode switch mock">
            <button class="mode-button active" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 3v4M12 17v4M4.2 6.2l2.8 2.8M17 15l2.8 2.8M3 12h4M17 12h4M4.2 17.8 7 15M17 9l2.8-2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              对话
            </button>
            <button class="mode-button" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M9 18h6M10 22h4M8 14a6 6 0 1 1 8 0c-.7.6-1 1.3-1 2H9c0-.7-.3-1.4-1-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              想法
            </button>
          </div>

          <div class="composer" aria-label="Launcher input mock">
            <div class="composer-placeholder">今天，想干点啥？</div>
            <div class="composer-toolbar">
              <span class="tool-chip">+</span>
              <span class="tool-chip">🔒 No Restrictions⌃</span>
              <span class="tool-chip">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 8v5l3 2M6.5 3.5 4 6M17.5 3.5 20 6M12 21a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                定时
              </span>
              <span class="tool-chip" style="margin-left:auto;">GPT-5.5⌃</span>
              <button class="send-button" type="button" aria-label="Send mock">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                </svg>
              </button>
            </div>
          </div>

          <div class="context-row">
            <span class="context-pill">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="m13 2-8 12h7l-1 8 8-12h-7l1-8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
              </svg>
              mino⌄
            </span>
            <span class="context-pill">💬⌄</span>
          </div>
        </div>
      </section>

      <section class="launcher-workspaces" aria-label="Launcher right rail playground">
        <div class="right-inner">
          <section id="workspacesPanel" class="workspaces-panel" aria-label="Agent workspaces">
            <div class="section-header">
              <div class="section-title-row">
                <h2 class="section-title">Agent 工作区</h2>
              </div>
              <div class="section-actions">
                <button class="primary-button" type="button">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                  添加
                </button>
              </div>
            </div>
            <div id="workspaceGrid" class="workspace-grid"></div>
            <button id="toggleWorkspaces" class="more-workspaces" type="button" aria-expanded="false"></button>
          </section>

          <section class="history-panel" aria-label="Conversation history">
            <div class="section-header">
              <div class="section-title-row">
                <h2 class="section-title">历史对话</h2>
              </div>
              <div class="history-toolbar">
                <button class="icon-button" type="button" aria-label="搜索历史对话">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                    <path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                </button>
                <button class="filter-chip" type="button">
                  全部
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </button>
              </div>
            </div>

            <div id="historyScroll" class="history-scroll">
              <div id="historyGroups"></div>
              <div id="historyEmpty" class="empty-note">没有更多历史记录</div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const iconBase = "../../src/renderer/assets/workspace-icons/";

    const workspaces = [
      { name: "MyAgents", icon: "cube.svg", path: "~/Documents/project/MyAgents", proactive: true, tags: ["飞书"] },
      { name: "cameo_web", icon: "cube.svg", path: "~/Documents/project/cameo_web", proactive: false, tags: [] },
      { name: "mino", icon: "lightning.svg", path: "~/Documents/project/mino", proactive: true, tags: ["飞书"] },
      { name: "MyAgents-Cuse", icon: "cube.svg", path: "~/Documents/project/MyAgents-Cuse", proactive: false, tags: [] },
      { name: "tem_project", icon: "robot.svg", path: "~/Documents/project/tem_project", proactive: true, tags: ["微信"] },
      { name: "zao_translate", icon: "cube.svg", path: "~/Documents/project/zao_translate", proactive: false, tags: [] },
      { name: "Mino5", icon: "lightning.svg", path: "~/.myagents/projects/Mino5", proactive: true, tags: [] },
      { name: "typeset-md", icon: "sparkle.svg", path: "~/Documents/project/typeset-md", proactive: false, tags: [] },
      { name: "mino115_bot", icon: "cube.svg", path: "~/.myagents/projects/mino115_bot", proactive: true, tags: ["Telegram"] },
      { name: "mino123", icon: "lightning.svg", path: "~/.myagents/projects/mino123", proactive: false, tags: [] }
    ];

    const historySeed = [
      ["今天", "19:55", "MyAgents 首页埋点审计", "MyAgents", 7, ""],
      ["今天", "19:46", "MyAgents任务系统Chat化", "MyAgents", 11, ""],
      ["今天", "19:40", "MonacoEditor 高亮与长文件性能", "MyAgents", 8, ""],
      ["今天", "18:19", "LLM wiki 知乎事实编译", "mino", 29, ""],
      ["今天", "18:12", "Agent Native 软件生长洞察", "mino", 15, "飞书"],
      ["今天", "17:44", "Task Center Overlay 任务搜索重构", "MyAgents", 18, ""],
      ["今天", "16:27", "Codex Runtime 工具附件展示", "MyAgents", 22, ""],
      ["今天", "15:03", "插件安装失败路径回归排查", "MyAgents", 6, ""],
      ["昨天", "23:48", "首页新建任务入口语义梳理", "tem_project", 13, "微信"],
      ["昨天", "22:31", "Claude Plugin 加载 PRD 过稿", "MyAgents", 34, ""],
      ["昨天", "21:12", "OpenClaw Bridge Channel 状态回放", "mino115_bot", 16, "Telegram"],
      ["昨天", "19:04", "Markdown typeset 发布前检查", "typeset-md", 9, ""],
      ["昨天", "16:25", "翻译工作流批处理模板", "zao_translate", 5, ""],
      ["昨天", "14:50", "我的任务与历史会话分层讨论", "MyAgents", 21, ""],
      ["昨天", "11:09", "Mino 记忆更新失败后续验证", "Mino5", 12, ""],
      ["本周", "周三", "Browser Panel 子 WebView 遮罩协调", "MyAgents", 27, ""],
      ["本周", "周三", "Gemini ACP Runtime 空转问题复盘", "MyAgents", 19, ""],
      ["本周", "周二", "Cameo Web 视觉风格探索", "cameo_web", 14, ""],
      ["本周", "周二", "Task Provider Routing 三层架构", "MyAgents", 31, ""],
      ["本周", "周一", "工作区文件 IO 启动页解耦", "MyAgents", 26, ""],
      ["本周", "周一", "IM Bot 主动 Agent 配置审查", "mino123", 7, ""],
      ["更早", "06-12", "字号系统 2.5 收口验证", "MyAgents", 44, ""],
      ["更早", "06-11", "Launcher 右栏信息密度审计", "MyAgents", 17, ""],
      ["更早", "06-10", "Tantivy 搜索结果高亮策略", "MyAgents", 23, ""],
      ["更早", "06-09", "Windows WebView2 滚动条观感修复", "MyAgents", 10, ""],
      ["更早", "06-08", "多 Runtime Session 保护补测", "MyAgents", 38, ""],
      ["更早", "06-07", "飞书 Channel 心跳卡片样式", "mino", 8, "飞书"],
      ["更早", "06-06", "模板工作区初始化体验整理", "tem_project", 11, ""],
      ["更早", "06-05", "Codex 图片附件归档展示", "MyAgents", 12, ""],
      ["更早", "06-04", "任务状态机审计链 UI", "MyAgents", 25, ""],
      ["更早", "06-03", "Agent 设置页能力分区打磨", "MyAgents", 16, ""],
      ["更早", "06-02", "插件 Bridge SDK shim 兼容测试", "MyAgents", 20, ""],
      ["更早", "06-01", "历史会话搜索入口导航", "MyAgents", 18, ""],
      ["更早", "05-31", "Mino 多渠道上下文归档", "mino", 15, ""]
    ].map(([group, time, title, workspace, count, tag]) => ({ group, time, title, workspace, count, tag }));

    const pageSize = 12;
    let workspaceExpanded = false;
    let currentPage = 1;

    const workspaceGrid = document.getElementById("workspaceGrid");
    const toggleWorkspaces = document.getElementById("toggleWorkspaces");
    const workspacesPanel = document.getElementById("workspacesPanel");
    const historyGroups = document.getElementById("historyGroups");
    const historyEmpty = document.getElementById("historyEmpty");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function workspaceIconFor(name) {
      const workspace = workspaces.find(item => item.name === name);
      return iconBase + (workspace?.icon || "cube.svg");
    }

    function renderHistoryTag(tag) {
      const kind = tag === "定时" ? "cron" : "im";
      return `
        <span class="history-tag ${kind}">
          <span class="history-tag-dot"></span>
          ${escapeHtml(tag)}
        </span>
      `;
    }

    function renderWorkspaces() {
      const visible = workspaceExpanded ? workspaces : workspaces.slice(0, 4);
      workspaceGrid.innerHTML = visible.map(item => `
        <button class="workspace-card" type="button">
          <img class="workspace-icon" alt="" src="${iconBase}${escapeHtml(item.icon)}" />
          <span class="workspace-copy">
            <span class="workspace-name">
              <span class="workspace-title-text">${escapeHtml(item.name)}</span>
              ${item.proactive ? `
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="color:var(--heartbeat);flex:none;">
                  <path d="M19.5 12.5 12 20l-7.5-7.5a5 5 0 0 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                </svg>
              ` : ""}
              ${item.tags.length ? `
                <span class="workspace-inline-tags">
                  ${item.tags.map(tag => `<span class="badge success"><span class="badge-dot"></span>${escapeHtml(tag)}</span>`).join("")}
                </span>
              ` : ""}
            </span>
            <span class="workspace-path truncate">${escapeHtml(item.path.replace("~/Documents/project/", "~/Documents/project/.../"))}</span>
          </span>
        </button>
      `).join("");

      workspacesPanel.classList.toggle("expanded", workspaceExpanded);
      toggleWorkspaces.hidden = workspaces.length <= 4;
      toggleWorkspaces.setAttribute("aria-expanded", String(workspaceExpanded));
      toggleWorkspaces.innerHTML = workspaceExpanded
        ? `收起工作区 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m18 15-6-6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `展开更多 ${workspaces.length - 4} 个 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }

    function renderHistory() {
      const visible = historySeed.slice(0, currentPage * pageSize);
      const groups = new Map();
      for (const item of visible) {
        if (!groups.has(item.group)) groups.set(item.group, []);
        groups.get(item.group).push(item);
      }

      historyGroups.innerHTML = Array.from(groups.entries()).map(([group, items]) => `
        <section class="day-group" aria-label="${escapeHtml(group)}">
          <div class="day-label">
            <span>${escapeHtml(group)}</span>
            <span class="day-line"></span>
          </div>
          <div class="history-list">
            ${items.map(item => `
              <button class="history-row" type="button">
                <span class="history-time">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
                    <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                  ${escapeHtml(item.time)}
                </span>
                <span class="history-project">
                  <img src="${workspaceIconFor(item.workspace)}" alt="" />
                  <span class="history-project-name">${escapeHtml(item.workspace)}</span>
                </span>
                <span class="history-main">
                  ${item.tag ? renderHistoryTag(item.tag) : ""}
                  <span class="history-title">${escapeHtml(item.title)}</span>
                  <span class="message-count">${item.count} 条消息</span>
                </span>
              </button>
            `).join("")}
          </div>
        </section>
      `).join("");

      historyEmpty.style.display = "none";
    }

    toggleWorkspaces.addEventListener("click", () => {
      workspaceExpanded = !workspaceExpanded;
      renderWorkspaces();
    });

    historyScroll.addEventListener("scroll", () => {
      if (currentPage * pageSize >= historySeed.length) return;
      const remaining = historyScroll.scrollHeight - historyScroll.scrollTop - historyScroll.clientHeight;
      if (remaining > 80) return;
      currentPage += 1;
      renderHistory();
    });

    renderWorkspaces();
    renderHistory();
  </script>
</body>
</html>
